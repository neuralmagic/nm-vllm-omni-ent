name: "Midstream Build"

on:
  push:
    tags:
      - "omni-*"

  workflow_dispatch:
    inputs:
      build_step:
        description: "Which build step to trigger"
        required: true
        type: choice
        options:
          - vllm-wheel
          - omni-wheel
          - docker-image
      omni_ref:
        description: "nm-vllm-omni-ent branch/tag/SHA (default: current ref)"
        required: false
        type: string
      vllm_ref:
        description: "nm-vllm-ent branch for vLLM wheel build"
        required: false
        default: "main"
        type: string
      vllm_run_id:
        description: "Existing vLLM wheel run ID (required for omni-wheel and docker-image)"
        required: false
        type: string
      omni_run_id:
        description: "Existing omni wheel run ID (required for docker-image)"
        required: false
        type: string
      nm_cicd_ref:
        description: "nm-cicd branch to run workflow from"
        required: false
        default: "vllm-omni-build"
        type: string
      target_device:
        description: "Target device"
        required: false
        default: "cuda"
        type: choice
        options:
          - cuda
          - rocm
          - cpu
      build_label:
        description: "Override runner label (leave empty for defaults)"
        required: false
        type: string

permissions:
  contents: read

env:
  NM_CICD_REPO: neuralmagic/nm-cicd

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          # Build step — default to omni-wheel for tag pushes
          BUILD_STEP="${{ inputs.build_step }}"
          if [[ -z "${BUILD_STEP}" ]]; then
            BUILD_STEP="omni-wheel"
          fi

          # Omni ref — default to whatever triggered this run
          OMNI_REF="${{ inputs.omni_ref }}"
          if [[ -z "${OMNI_REF}" ]]; then
            OMNI_REF="${GITHUB_REF_NAME}"
          fi

          # vLLM ref
          VLLM_REF="${{ inputs.vllm_ref }}"
          if [[ -z "${VLLM_REF}" ]]; then
            VLLM_REF="main"
          fi

          # nm-cicd ref
          NM_CICD_REF="${{ inputs.nm_cicd_ref }}"
          if [[ -z "${NM_CICD_REF}" ]]; then
            NM_CICD_REF="vllm-omni-build"
          fi

          # Target device
          TARGET_DEVICE="${{ inputs.target_device }}"
          if [[ -z "${TARGET_DEVICE}" ]]; then
            TARGET_DEVICE="cuda"
          fi

          # Build label defaults per step
          BUILD_LABEL="${{ inputs.build_label }}"
          if [[ -z "${BUILD_LABEL}" ]]; then
            case "${BUILD_STEP}" in
              vllm-wheel|omni-wheel) BUILD_LABEL="k8s-a100-build-13-0" ;;
              docker-image)          BUILD_LABEL="ibm-wdc-k8s-h100-dind" ;;
            esac
          fi

          # Run IDs
          VLLM_RUN_ID="${{ inputs.vllm_run_id }}"
          OMNI_RUN_ID="${{ inputs.omni_run_id }}"

          {
            echo "build_step=${BUILD_STEP}"
            echo "omni_ref=${OMNI_REF}"
            echo "vllm_ref=${VLLM_REF}"
            echo "nm_cicd_ref=${NM_CICD_REF}"
            echo "target_device=${TARGET_DEVICE}"
            echo "build_label=${BUILD_LABEL}"
            echo "vllm_run_id=${VLLM_RUN_ID}"
            echo "omni_run_id=${OMNI_RUN_ID}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          STEP="${{ steps.resolve.outputs.build_step }}"
          VLLM_RUN_ID="${{ steps.resolve.outputs.vllm_run_id }}"
          OMNI_RUN_ID="${{ steps.resolve.outputs.omni_run_id }}"

          if [[ "${STEP}" == "omni-wheel" && -z "${VLLM_RUN_ID}" ]]; then
            echo "::error::omni-wheel requires vllm_run_id (the run ID of a completed vLLM wheel build)"
            exit 1
          fi

          if [[ "${STEP}" == "docker-image" && -z "${VLLM_RUN_ID}" ]]; then
            echo "::error::docker-image requires vllm_run_id"
            exit 1
          fi

          if [[ "${STEP}" == "docker-image" && -z "${OMNI_RUN_ID}" ]]; then
            echo "::error::docker-image requires omni_run_id (the run ID of a completed omni wheel build)"
            exit 1
          fi

      - name: Log request
        shell: bash
        run: |
          STEP="${{ steps.resolve.outputs.build_step }}"

          case "${STEP}" in
            vllm-wheel)   WORKFLOW="build-whl.yml" ;;
            omni-wheel)   WORKFLOW="build-whl.yml" ;;
            docker-image) WORKFLOW="build-image.yml" ;;
          esac

          cat <<EOF
          ======================================
          Midstream Build Request
          ======================================
          Build step:       ${STEP}
          Target workflow:  ${WORKFLOW}
          Target repo:      ${NM_CICD_REPO}
          Target ref:       ${{ steps.resolve.outputs.nm_cicd_ref }}

          Omni repo:        ${GITHUB_REPOSITORY}
          Omni ref:         ${{ steps.resolve.outputs.omni_ref }}
          vLLM ref:         ${{ steps.resolve.outputs.vllm_ref }}
          Target device:    ${{ steps.resolve.outputs.target_device }}
          Build label:      ${{ steps.resolve.outputs.build_label }}

          vLLM run ID:      ${{ steps.resolve.outputs.vllm_run_id || '(n/a)' }}
          Omni run ID:      ${{ steps.resolve.outputs.omni_run_id || '(n/a)' }}

          Requested by:     ${GITHUB_ACTOR}
          Source run:        ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          ======================================
          EOF

      - name: Trigger vllm-wheel build
        if: steps.resolve.outputs.build_step == 'vllm-wheel'
        env:
          GH_TOKEN: ${{ secrets.CICD_OMNI_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run build-whl.yml \
            --repo "${NM_CICD_REPO}" \
            --ref "${{ steps.resolve.outputs.nm_cicd_ref }}" \
            -f repo=neuralmagic/nm-vllm-ent \
            -f branch="${{ steps.resolve.outputs.vllm_ref }}" \
            -f target_device="${{ steps.resolve.outputs.target_device }}" \
            -f python=3.12.5 \
            -f build_label="${{ steps.resolve.outputs.build_label }}" \
            -f timeout=120 \
            -f partitions_file=neuralmagic/configs/partitions/minimal.yml

          echo "Triggered build-whl.yml for nm-vllm-ent"

      - name: Trigger omni-wheel build
        if: steps.resolve.outputs.build_step == 'omni-wheel'
        env:
          GH_TOKEN: ${{ secrets.CICD_OMNI_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run build-whl.yml \
            --repo "${NM_CICD_REPO}" \
            --ref "${{ steps.resolve.outputs.nm_cicd_ref }}" \
            -f repo=neuralmagic/nm-vllm-omni-ent \
            -f branch="${{ steps.resolve.outputs.omni_ref }}" \
            -f target_device="${{ steps.resolve.outputs.target_device }}" \
            -f python=3.12.5 \
            -f build_label="${{ steps.resolve.outputs.build_label }}" \
            -f timeout=120 \
            -f partitions_file=neuralmagic/configs/partitions/minimal.yml \
            -f vllm_run_id="${{ steps.resolve.outputs.vllm_run_id }}"

          echo "Triggered build-whl.yml for nm-vllm-omni-ent"

      - name: Trigger docker-image build
        if: steps.resolve.outputs.build_step == 'docker-image'
        env:
          GH_TOKEN: ${{ secrets.CICD_OMNI_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run build-image.yml \
            --repo "${NM_CICD_REPO}" \
            --ref "${{ steps.resolve.outputs.nm_cicd_ref }}" \
            -f repo=neuralmagic/nm-vllm-omni-ent \
            -f branch="${{ steps.resolve.outputs.omni_ref }}" \
            -f target_device="${{ steps.resolve.outputs.target_device }}" \
            -f build_label="${{ steps.resolve.outputs.build_label }}" \
            -f run_id="${{ steps.resolve.outputs.omni_run_id }}" \
            -f vllm_run_id="${{ steps.resolve.outputs.vllm_run_id }}"

          echo "Triggered build-image.yml for nm-vllm-omni-ent"

      - name: Poll for triggered run
        env:
          GH_TOKEN: ${{ secrets.CICD_OMNI_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          STEP="${{ steps.resolve.outputs.build_step }}"
          NM_CICD_REF="${{ steps.resolve.outputs.nm_cicd_ref }}"

          case "${STEP}" in
            vllm-wheel|omni-wheel) WORKFLOW="build-whl.yml" ;;
            docker-image)          WORKFLOW="build-image.yml" ;;
          esac

          echo "Polling for triggered run (workflow=${WORKFLOW}, branch=${NM_CICD_REF})..."

          TRIGGERED_RUN_ID=""
          for attempt in 1 2 3 4 5 6; do
            sleep 5
            TRIGGERED_RUN_ID=$(gh run list \
              --repo "${NM_CICD_REPO}" \
              --workflow "${WORKFLOW}" \
              --branch "${NM_CICD_REF}" \
              --limit 1 \
              --json databaseId,status,createdAt \
              --jq '.[0].databaseId // empty') || true

            if [[ -n "${TRIGGERED_RUN_ID}" ]]; then
              echo "Found run: ${TRIGGERED_RUN_ID}"
              break
            fi
            echo "Attempt ${attempt}/6: run not yet visible, retrying..."
          done

          RUN_URL="https://github.com/${NM_CICD_REPO}/actions/runs/${TRIGGERED_RUN_ID}"

          if [[ -n "${TRIGGERED_RUN_ID}" ]]; then
            echo "nm_cicd_run_id=${TRIGGERED_RUN_ID}" >> "${GITHUB_OUTPUT}"

            {
              echo "## Midstream Build — ${STEP}"
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| **Build step** | \`${STEP}\` |"
              echo "| **nm-cicd run** | [${TRIGGERED_RUN_ID}](${RUN_URL}) |"
              echo "| **Omni ref** | \`${{ steps.resolve.outputs.omni_ref }}\` |"
              echo "| **Target device** | \`${{ steps.resolve.outputs.target_device }}\` |"
              echo "| **Requested by** | ${GITHUB_ACTOR} |"
              echo ""
              echo "### Next steps"
              echo ""
              case "${STEP}" in
                vllm-wheel)
                  echo "Once this run completes, trigger the **omni-wheel** step:"
                  echo "\`\`\`"
                  echo "build_step: omni-wheel"
                  echo "vllm_run_id: ${TRIGGERED_RUN_ID}"
                  echo "\`\`\`"
                  ;;
                omni-wheel)
                  echo "Once this run completes, trigger the **docker-image** step:"
                  echo "\`\`\`"
                  echo "build_step: docker-image"
                  echo "vllm_run_id: ${{ steps.resolve.outputs.vllm_run_id }}"
                  echo "omni_run_id: ${TRIGGERED_RUN_ID}"
                  echo "\`\`\`"
                  ;;
                docker-image)
                  echo "Image build triggered. Watch the nm-cicd run for the resulting image tag."
                  ;;
              esac
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "::warning::Could not find the triggered run after 30s. Check nm-cicd Actions manually: https://github.com/${NM_CICD_REPO}/actions"

            {
              echo "## Midstream Build — ${STEP}"
              echo ""
              echo "> **Warning:** Could not detect the triggered run ID. The workflow was dispatched but the run was not visible within 30 seconds."
              echo ""
              echo "Check [nm-cicd Actions](https://github.com/${NM_CICD_REPO}/actions) manually."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
