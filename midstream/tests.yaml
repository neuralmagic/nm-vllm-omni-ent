# Some of these test are not yet included upstream
# TODO add the tests for Qwen/Qwen3-Omni-30B-A3B-Thinking when ready
tests:
  - "pytest -sv tests/diffusion -m 'core_model and cuda' --ignore=tests/diffusion/models"
  - "pytest -sv -m 'core_model and cpu' --ignore=tests/diffusion --ignore=tests/model_executor"
  - "pytest -sv tests/entrypoints/ -m 'advanced_model and cuda'"
  - "pytest -sv tests/model_executor/stage_input_processors/test_qwen3_omni_streaming_helpers.py"
  - "pytest -sv tests/e2e/online_serving/test_qwen3_omni.py --run-level 'advanced_model'"
  - "pytest -sv tests/e2e/online_serving/test_qwen3_omni_expansion.py --run-level 'advanced_model'" 
  - "pytest -sv tests/e2e/offline_inference/test_qwen3_omni.py --run-level 'advanced_model'"
  - "pytest -sv tests/model_executor/models/voxtral_tts tests/model_executor/stage_input_processors/test_voxtral_tts_async_chunk.py"
  - "pytest -sv tests/e2e/online_serving/test_voxtral_tts.py tests/e2e/offline_inference/test_voxtral_tts.py --run-level 'advanced_model'"
  - "pytest -sv tests/diffusion/models/flux2"
  - "pytest -sv tests/e2e/online_serving/test_flux2_klein.py tests/e2e/online_serving/test_flux2_klein_expansion.py tests/e2e/offline_inference/test_flux2_klein.py --run-level 'advanced_model'"
  - "pytest -sv tests/e2e/online_serving/test_flux_2_dev_expansion.py tests/e2e/offline_inference/test_flux2_dev_text2img.py --run-level 'advanced_model'"
  - "pytest -sv tests/model_executor/models/qwen3_tts tests/model_executor/stage_input_processors/test_qwen3_tts_async_chunk.py"
  - "pytest -sv tests/e2e/online_serving/test_qwen3_tts_base.py tests/e2e/online_serving/test_qwen3_tts_base_expansion.py tests/e2e/offline_inference/test_qwen3_tts_base.py --run-level 'advanced_model'"
  - "pytest -sv tests/e2e/online_serving/test_qwen3_tts_customvoice.py tests/e2e/online_serving/test_qwen3_tts_customvoice_expansion.py tests/e2e/offline_inference/test_qwen3_tts_customvoice.py --run-level 'advanced_model'"
  - "pytest -sv tests/e2e/online_serving/test_qwen3_omni_multi_replicas.py -m 'full_model' --run-level 'core_model'"
